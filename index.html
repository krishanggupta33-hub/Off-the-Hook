<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Off The Hook</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        body {
            margin: 0;
            background-color: #050505;
            color: #e0e0e0;
            font-family: 'VT323', 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none; 
            -webkit-user-select: none;
            touch-action: none;
        }
        #hud {
            display: none;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 900px;
            margin-bottom: 5px;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 0 10px;
            box-sizing: border-box;
        }
        .highlight { 
            color: #00e5ff; 
            font-weight: bold; 
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.6); 
        }
        .skip-btn {
            background-color: #ff003c;
            color: #000;
            border: 2px solid #ff003c;
            padding: 5px 15px;
            font-family: 'VT323', 'Courier New', monospace;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 0;
            text-transform: uppercase;
            transition: all 0.2s;
            box-shadow: 0 0 10px rgba(255, 0, 60, 0.5);
        }
        .skip-btn:hover {
            background-color: #000;
            color: #ff003c;
            box-shadow: 0 0 20px rgba(255, 0, 60, 0.9);
        }
        #gameWrapper {
            position: relative;
            width: 100%;
            max-width: 900px;
            aspect-ratio: 9 / 5;
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.2);
            border: 2px solid #00e5ff;
            border-radius: 4px;
            box-sizing: border-box;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background-color: #050505;
            touch-action: none; 
            image-rendering: pixelated;
        }
        #startScreen {
            position: absolute;
            inset: 0;
            background-color: rgba(5, 5, 5, 0.35);
            backdrop-filter: blur(3px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .title {
            font-size: 6rem;
            color: #00e5ff;
            text-shadow: 0 0 20px rgba(0, 229, 255, 0.8), 5px 5px 0px #ff003c;
            margin: 0 0 40px 0;
            letter-spacing: 5px;
            text-align: center;
        }
        #mainMenuControls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }
        .menu-btn {
            background-color: #000;
            color: #00e5ff;
            border: 2px solid #00e5ff;
            padding: 10px 40px;
            font-family: 'VT323', monospace;
            font-size: 2.5rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
            width: 280px;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
        }
        .menu-btn:hover {
            background-color: #ff003c;
            color: #fff;
            border-color: #ff003c;
            box-shadow: 0 0 20px rgba(255, 0, 60, 0.8);
            transform: scale(1.05);
        }
        #coffeeMsg {
            display: none;
            color: #ff003c;
            font-size: 1.8rem;
            text-shadow: 0 0 10px rgba(255, 0, 60, 0.8);
            margin-top: 10px;
            text-align: center;
        }
        #levelSelectUI {
            display: none;
            flex-direction: column;
            align-items: center;
        }
        #levelGrid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        .level-btn {
            background-color: #000;
            color: #00e5ff;
            border: 2px solid #00e5ff;
            width: 60px;
            height: 60px;
            font-family: 'VT323', monospace;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .level-btn:hover {
            background-color: #ff003c;
            color: #fff;
            border-color: #ff003c;
            box-shadow: 0 0 15px #ff003c;
            transform: scale(1.1);
        }
        .credit {
            position: absolute;
            bottom: 15px;
            right: 20px;
            color: #ff003c;
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 0, 60, 0.5);
        }
        .controls {
            margin-top: 15px;
            font-size: 1.2rem;
            color: #00e5ff;
            text-align: center;
            line-height: 1.6;
            opacity: 0.7;
        }
        #mobileControls {
            display: none;
            width: 100%;
            max-width: 900px;
            justify-content: space-between;
            padding: 10px 20px;
            box-sizing: border-box;
            margin-top: 10px;
        }
        .m-btn-group {
            display: flex;
            gap: 15px;
        }
        .m-btn {
            background-color: rgba(0, 0, 0, 0.5);
            color: #00e5ff;
            border: 2px solid #00e5ff;
            width: 60px;
            height: 60px;
            font-size: 2rem;
            font-weight: bold;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
        }
        .m-btn:active {
            background-color: #ff003c;
            border-color: #ff003c;
            color: #fff;
        }
        @media (max-width: 768px) {
            .title { font-size: 3.5rem; margin-bottom: 20px; }
            .menu-btn { width: 220px; font-size: 2rem; padding: 10px; }
            #levelGrid { gap: 8px; }
            .level-btn { width: 50px; height: 50px; font-size: 1.5rem; }
            .controls { display: none !important; }
            #mobileControls { display: flex; }
            .credit { font-size: 1.2rem; bottom: 5px; right: 10px; }
            #hud { font-size: 1.2rem; }
            .skip-btn { padding: 5px 10px; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div id="hud">
        <div>LVL: <span id="levelDisplay" class="highlight">1</span></div>
        <div>BEST: <span id="bestTimeDisplay" class="highlight">--</span>S</div>
        <div>TIME: <span id="timer" class="highlight">0.00</span>S</div>
        <button id="skipBtn" class="skip-btn">SKIP</button>
    </div>
    
    <div id="gameWrapper">
        <canvas id="gameCanvas" width="900" height="500"></canvas>
        <div id="startScreen">
            <h1 class="title">OFF THE HOOK</h1>
            
            <div id="mainMenuControls">
                <button id="startBtn" class="menu-btn">START</button>
                <button id="levelsBtn" class="menu-btn">LEVELS</button>
                <button id="coffeeBtn" class="menu-btn" style="font-size: 1.8rem;">BUY ME A COFFEE</button>
                <div id="coffeeMsg">KEEP YOUR PENNIES, I'M ALREADY RICH.</div>
            </div>

            <div id="levelSelectUI">
                <div id="levelGrid"></div>
                <button id="backBtn" class="menu-btn" style="width: auto; padding: 5px 30px; font-size: 1.5rem;">BACK</button>
            </div>

            <div class="credit">BY KRISHANG GUPTA</div>
        </div>
    </div>
    
    <div class="controls" id="controls">
        [A] / [D] : MOVE &nbsp;&nbsp;|&nbsp;&nbsp; [SPACE] : JUMP / CUT ROPE &nbsp;&nbsp;|&nbsp;&nbsp; [LEFT CLICK] : GRAPPLE
    </div>

    <div id="mobileControls">
        <div class="m-btn-group">
            <div class="m-btn" id="mBtnLeft">◀</div>
            <div class="m-btn" id="mBtnRight">▶</div>
        </div>
        <div class="m-btn-group">
            <div class="m-btn" id="mBtnJump">▲</div>
        </div>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false;

const timerElement = document.getElementById("timer");
const levelElement = document.getElementById("levelDisplay");
const bestTimeElement = document.getElementById("bestTimeDisplay");
const skipBtn = document.getElementById("skipBtn");
const startScreen = document.getElementById("startScreen");
const hud = document.getElementById("hud");
const levelGrid = document.getElementById("levelGrid");
const controls = document.getElementById("controls");
const mobileControls = document.getElementById("mobileControls");

const mainMenuControls = document.getElementById("mainMenuControls");
const levelSelectUI = document.getElementById("levelSelectUI");
const startBtn = document.getElementById("startBtn");
const levelsBtn = document.getElementById("levelsBtn");
const backBtn = document.getElementById("backBtn");
const coffeeBtn = document.getElementById("coffeeBtn");
const coffeeMsg = document.getElementById("coffeeMsg");

const mBtnLeft = document.getElementById("mBtnLeft");
const mBtnRight = document.getElementById("mBtnRight");
const mBtnJump = document.getElementById("mBtnJump");

const bikeImg = new Image();
bikeImg.src = 'bike.png.png';

const bgMusic = new Audio('music.mp3');
bgMusic.loop = true;
bgMusic.volume = 0.4;

let gameState = "menu";
let startTime = Date.now();
let timerStarted = false;
let currentLevel = 0;
let particles = [];
let trail = [];
let levels = [];
let bestTimes = JSON.parse(localStorage.getItem('offTheHookBestTimes')) || {};
let shakeMagnitude = 0;
let shakeDuration = 0;

const keys = { a: false, d: false, space: false };
const mouse = { x: 0, y: 0, isDown: false };

const player = {
    x: 50, y: 400, vx: 0, vy: 0, width: 45, height: 25,
    speed: 0.6, maxSpeed: 7, friction: 0.85, gravity: 0.45, jumpForce: 12,
    grounded: false, isGrappling: false, anchorX: 0, anchorY: 0, ropeLength: 0, swingAccel: 0.3
};

window.addEventListener("pointerdown", () => {
    if (bgMusic.paused) {
        bgMusic.play().catch(() => {});
    }
}, { once: true });

startBtn.addEventListener("click", () => {
    startGame(0);
});

levelsBtn.addEventListener("click", () => {
    mainMenuControls.style.display = "none";
    levelSelectUI.style.display = "flex";
});

backBtn.addEventListener("click", () => {
    levelSelectUI.style.display = "none";
    mainMenuControls.style.display = "flex";
});

coffeeBtn.addEventListener("click", () => {
    coffeeBtn.style.display = "none";
    coffeeMsg.style.display = "block";
});

function triggerShake(magnitude, duration) {
    shakeMagnitude = magnitude;
    shakeDuration = duration;
}

skipBtn.addEventListener("click", () => {
    if (currentLevel >= levels.length - 1) {
        completeGame();
    } else {
        loadLevel(currentLevel + 1);
    }
});

function triggerJumpAction() {
    keys.space = true;
    if (player.isGrappling) {
        player.isGrappling = false;
        player.vy -= player.jumpForce * 0.6;
        triggerShake(4, 5); 
        spawnParticles(player.x + player.width/2, player.y + player.height/2, "#00e5ff", 8); 
    }
}

window.addEventListener("keydown", (e) => {
    if (gameState !== "playing") return;
    if (e.key.toLowerCase() === "a") keys.a = true;
    if (e.key.toLowerCase() === "d") keys.d = true;
    if (e.key === " ") {
        triggerJumpAction();
    }
});

window.addEventListener("keyup", (e) => {
    if (e.key.toLowerCase() === "a") keys.a = false;
    if (e.key.toLowerCase() === "d") keys.d = false;
    if (e.key === " ") keys.space = false;
});

mBtnLeft.addEventListener("touchstart", (e) => { e.preventDefault(); keys.a = true; });
mBtnLeft.addEventListener("touchend", (e) => { e.preventDefault(); keys.a = false; });
mBtnRight.addEventListener("touchstart", (e) => { e.preventDefault(); keys.d = true; });
mBtnRight.addEventListener("touchend", (e) => { e.preventDefault(); keys.d = false; });
mBtnJump.addEventListener("touchstart", (e) => { e.preventDefault(); triggerJumpAction(); });
mBtnJump.addEventListener("touchend", (e) => { e.preventDefault(); keys.space = false; });

function updateMousePos(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    mouse.x = (clientX - rect.left) * (canvas.width / rect.width);
    mouse.y = (clientY - rect.top) * (canvas.height / rect.height);
}

canvas.addEventListener("mousemove", (e) => {
    updateMousePos(e.clientX, e.clientY);
});

canvas.addEventListener("mousedown", (e) => {
    e.preventDefault(); 
    if (gameState === "complete") {
        returnToMenu();
        return;
    }
    if (gameState === "playing" && e.button === 0) {
        updateMousePos(e.clientX, e.clientY);
        mouse.isDown = true;
        attemptGrapple();
    }
});

window.addEventListener("mouseup", (e) => {
    if (e.button === 0) {
        mouse.isDown = false;
        player.isGrappling = false;
    }
});

canvas.addEventListener("touchstart", (e) => {
    e.preventDefault();
    if (gameState === "complete") {
        returnToMenu();
        return;
    }
    if (gameState === "playing") {
        updateMousePos(e.touches[0].clientX, e.touches[0].clientY);
        mouse.isDown = true;
        attemptGrapple();
    }
}, { passive: false });

canvas.addEventListener("touchmove", (e) => {
    e.preventDefault();
    updateMousePos(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });

window.addEventListener("touchend", () => {
    mouse.isDown = false;
    player.isGrappling = false;
});

function spawnParticles(x, y, color, count) {
    for(let i=0; i<count; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 6,
            vy: (Math.random() - 0.5) * 6,
            alpha: 1,
            color: color
        });
    }
}

function attemptGrapple() {
    if (levels.length === 0 || gameState !== "playing") return;
    const activeLevel = levels[currentLevel];
    for (let plat of activeLevel.platforms) {
        if (mouse.x >= plat.x && mouse.x <= plat.x + plat.width &&
            mouse.y >= plat.y && mouse.y <= plat.y + plat.height) {
            player.isGrappling = true;
            player.anchorX = mouse.x;
            player.anchorY = mouse.y;
            let dx = (player.x + player.width/2) - player.anchorX;
            let dy = (player.y + player.height/2) - player.anchorY;
            player.ropeLength = Math.sqrt(dx * dx + dy * dy);
            triggerShake(2, 3);
            spawnParticles(mouse.x, mouse.y, "#00e5ff", 10);
            return;
        }
    }
}

function startGame(index) {
    startScreen.style.display = "none";
    hud.style.display = "flex";
    if (window.innerWidth > 768) {
        controls.style.display = "block";
    }
    gameState = "playing";
    loadLevel(index);
}

function returnToMenu() {
    startScreen.style.display = "flex";
    mainMenuControls.style.display = "flex";
    levelSelectUI.style.display = "none";
    hud.style.display = "none";
    controls.style.display = "none";
    gameState = "menu";
}

function completeGame() {
    gameState = "complete";
}

function loadLevel(index) {
    currentLevel = index;
    const levelData = levels[currentLevel];
    player.x = levelData.spawn.x;
    player.y = levelData.spawn.y;
    player.vx = 0;
    player.vy = 0;
    player.isGrappling = false;
    particles = [];
    trail = [];
    timerStarted = false;
    timerElement.innerText = "0.00";
    levelElement.innerText = currentLevel + 1;
    let bt = bestTimes[`level${currentLevel}`];
    bestTimeElement.innerText = bt ? bt : "--";
}

function checkCollision(p, plat) {
    return p.x < plat.x + plat.width && p.x + p.width > plat.x &&
           p.y < plat.y + plat.height && p.y + p.height > plat.y;
}

async function initGame() {
    try {
        const response = await fetch('levels.json?v=' + Date.now());
        levels = await response.json();
        levels.forEach((_, i) => {
            const btn = document.createElement("button");
            btn.className = "level-btn";
            btn.innerText = i + 1;
            btn.onclick = () => startGame(i);
            levelGrid.appendChild(btn);
        });
        loadLevel(0);
        requestAnimationFrame(update);
    } catch (error) {}
}

function update() {
    requestAnimationFrame(update);
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    
    if (gameState === "complete") {
        ctx.fillStyle = "#050505";
        ctx.fillRect(0, 0, 900, 500);
        ctx.fillStyle = "#00e5ff";
        ctx.font = "bold 64px VT323";
        ctx.textAlign = "center";
        ctx.fillText("SYSTEM OVERRIDDEN", 450, 220);
        ctx.fillStyle = "#ff003c";
        ctx.font = "32px VT323";
        ctx.fillText("ESCAPE SUCCESSFUL", 450, 280);
        ctx.fillStyle = "#ffffff";
        ctx.font = "24px VT323";
        ctx.fillText("CLICK TO RETURN TO MENU", 450, 350);
        ctx.restore();
        return;
    }

    if (shakeDuration > 0 && gameState === "playing") {
        ctx.translate((Math.random() - 0.5) * shakeMagnitude, (Math.random() - 0.5) * shakeMagnitude);
        shakeDuration--;
    }
    
    if (levels.length === 0) {
        ctx.restore();
        return;
    }

    const activeLevel = levels[currentLevel];
    let activePlatforms = [...activeLevel.platforms];
    
    if (gameState === "playing") {
        if (!timerStarted) {
            if (keys.a || keys.d || keys.space || mouse.isDown) {
                timerStarted = true;
                startTime = Date.now();
            }
        }
        
        const elapsed = timerStarted ? ((Date.now() - startTime) / 1000).toFixed(2) : "0.00";
        timerElement.innerText = elapsed;

        if (!player.isGrappling) {
            player.vy += player.gravity;
            if (keys.a) player.vx -= player.speed;
            if (keys.d) player.vx += player.speed;
            player.vx *= player.friction;
        } else {
            player.vy += player.gravity; 
            if (keys.a) player.vx -= player.swingAccel;
            if (keys.d) player.vx += player.swingAccel;
            let nextX = player.x + player.vx;
            let nextY = player.y + player.vy;
            let dx = (nextX + player.width/2) - player.anchorX;
            let dy = (nextY + player.height/2) - player.anchorY;
            let currentDist = Math.sqrt(dx * dx + dy * dy);
            if (currentDist > player.ropeLength) {
                let unitX = dx / currentDist;
                let unitY = dy / currentDist;
                player.x = player.anchorX + (unitX * player.ropeLength) - player.width/2;
                player.y = player.anchorY + (unitY * player.ropeLength) - player.height/2;
                let velAlongNormal = player.vx * unitX + player.vy * unitY;
                if (velAlongNormal > 0) {
                    player.vx -= velAlongNormal * unitX;
                    player.vy -= velAlongNormal * unitY;
                }
            }
        }

        player.vx = Math.max(-player.maxSpeed, Math.min(player.maxSpeed, player.vx));
        player.vy = Math.max(-player.maxSpeed * 1.5, Math.min(player.maxSpeed * 1.5, player.vy));
        player.x += player.vx;
        
        for (let plat of activePlatforms) {
            if (checkCollision(player, plat)) {
                if (player.vx > 0) player.x = plat.x - player.width;
                if (player.vx < 0) player.x = plat.x + plat.width;
                player.vx = 0;
            }
        }

        let previouslyGrounded = player.grounded;
        player.y += player.vy;
        player.grounded = false;
        
        for (let plat of activePlatforms) {
            if (checkCollision(player, plat)) {
                if (player.vy > 0) {
                    player.y = plat.y - player.height;
                    player.grounded = true;
                    if (!previouslyGrounded && player.vy > 5) {
                        triggerShake(4, 5); 
                        spawnParticles(player.x + player.width/2, player.y + player.height, "#ff003c", 8);
                    }
                    player.vy = 0;
                } else if (player.vy < 0) {
                    player.y = plat.y + plat.height;
                    player.vy = 0;
                }
            }
        }

        if (keys.space && player.grounded && !player.isGrappling) {
            player.vy = -player.jumpForce;
            player.grounded = false;
            spawnParticles(player.x + player.width/2, player.y + player.height, "#ff003c", 5);
        }

        if (player.y > 900) {
            triggerShake(10, 10); 
            loadLevel(currentLevel); 
        }
        
        if (checkCollision(player, activeLevel.goal)) {
            let currentBest = bestTimes[`level${currentLevel}`];
            if (!currentBest || parseFloat(elapsed) < parseFloat(currentBest)) {
                bestTimes[`level${currentLevel}`] = elapsed;
                localStorage.setItem('offTheHookBestTimes', JSON.stringify(bestTimes));
            }
            if (currentLevel >= levels.length - 1) {
                completeGame();
            } else {
                loadLevel(currentLevel + 1);
            }
        }

        trail.push({ x: player.x + player.width / 2, y: player.y + player.height / 2 });
        if (trail.length > 25) {
            trail.shift();
        }
    }

    ctx.strokeStyle = "rgba(0, 229, 255, 0.04)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    for(let i=0; i<900; i+=40) { ctx.moveTo(i,0); ctx.lineTo(i,500); }
    for(let i=0; i<500; i+=40) { ctx.moveTo(0,i); ctx.lineTo(900,i); }
    ctx.stroke();

    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        if (gameState === "playing") {
            p.x += p.vx;
            p.y += p.vy;
            p.alpha -= 0.03;
        }
        if (p.alpha <= 0) {
            particles.splice(i, 1);
            continue;
        }
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 6, 6);
    }
    ctx.globalAlpha = 1.0;

    for (let plat of activePlatforms) {
        ctx.fillStyle = "#050505";
        ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
        ctx.strokeStyle = "#00e5ff";
        ctx.lineWidth = 2;
        ctx.strokeRect(plat.x, plat.y, plat.width, plat.height);
    }

    ctx.fillStyle = "#ff003c";
    ctx.fillRect(activeLevel.goal.x, activeLevel.goal.y, activeLevel.goal.width, activeLevel.goal.height);

    if (player.isGrappling) {
        ctx.strokeStyle = "#00e5ff";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(player.x + player.width/2, player.y + player.height/2);
        ctx.lineTo(player.anchorX, player.anchorY);
        ctx.stroke();
        ctx.fillStyle = "#ff003c";
        ctx.beginPath();
        ctx.arc(player.anchorX, player.anchorY, 5, 0, Math.PI * 2);
        ctx.fill();
    }

    if (trail.length > 1) {
        ctx.beginPath();
        ctx.moveTo(trail[0].x, trail[0].y);
        for (let i = 1; i < trail.length; i++) {
            ctx.lineTo(trail[i].x, trail[i].y);
        }
        ctx.strokeStyle = "rgba(0, 229, 255, 0.4)";
        ctx.lineWidth = 5;
        ctx.stroke();
    }

    if (bikeImg.complete && bikeImg.naturalHeight !== 0) {
        ctx.save();
        if (player.vx < -0.1 || (keys.a && !keys.d)) {
            ctx.translate(player.x + player.width, player.y);
            ctx.scale(-1, 1);
            ctx.drawImage(bikeImg, 0, 0, player.width, player.height);
        } else {
            ctx.drawImage(bikeImg, player.x, player.y, player.width, player.height);
        }
        ctx.restore();
    } else {
        ctx.fillStyle = player.isGrappling ? "#00e5ff" : "#ffffff";
        ctx.fillRect(player.x, player.y, player.width, player.height);
    }

    ctx.restore(); 
}

initGame();
</script>
