<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFF THE HOOK - Tron Edition</title>
    <style>
        body {
            margin: 0;
            background-color: #050505;
            color: #e0e0e0;
            font-family: 'Consolas', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none; 
            -webkit-user-select: none;
        }
        #hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 900px;
            margin-bottom: 10px;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .highlight { color: #00e5ff; font-weight: bold; text-shadow: 0 0 10px rgba(0, 229, 255, 0.5); }
        .skip-btn {
            background-color: #ff5500;
            color: #000;
            border: 2px solid #ff5500;
            padding: 5px 15px;
            font-family: 'Consolas', monospace;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
            transition: all 0.2s;
            box-shadow: 0 0 10px rgba(255, 85, 0, 0.5);
        }
        .skip-btn:hover {
            background-color: #000;
            color: #ff5500;
            box-shadow: 0 0 20px rgba(255, 85, 0, 0.8);
        }
        canvas {
            border: 2px solid #00e5ff;
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.3);
            background-color: #000000;
            touch-action: none; 
            image-rendering: pixelated;
        }
        .controls {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #00e5ff;
            text-align: center;
            line-height: 1.6;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div id="hud">
        <div>Level: <span id="levelDisplay" class="highlight">1</span></div>
        <div>Best Time: <span id="bestTimeDisplay" class="highlight">--</span>s</div>
        <div>Time: <span id="timer" class="highlight">0.00</span>s</div>
        <button id="skipBtn" class="skip-btn">Skip Level</button>
    </div>
    
    <canvas id="gameCanvas" width="900" height="500"></canvas>
    
    <div class="controls">
        [A] / [D] : Move &nbsp;&nbsp;|&nbsp;&nbsp; [SPACE] : Jump / Cut Rope &nbsp;&nbsp;|&nbsp;&nbsp; [LEFT CLICK] : Shoot Grapple
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const timerElement = document.getElementById("timer");
const levelElement = document.getElementById("levelDisplay");
const bestTimeElement = document.getElementById("bestTimeDisplay");
const skipBtn = document.getElementById("skipBtn");

const bikeImg = new Image();
bikeImg.src = 'bike.png.png';

const bgMusic = new Audio('music.mp3');
bgMusic.loop = true;
bgMusic.volume = 0.4;

window.addEventListener("mousedown", () => {
    if (bgMusic.paused) {
        bgMusic.play().catch(() => {});
    }
}, { once: true });

let startTime = Date.now();
let currentLevel = 0;
let particles = [];
let levels = [];
let bestTimes = JSON.parse(localStorage.getItem('neonTetherBestTimes')) || {};
let gameComplete = false;
let shakeMagnitude = 0;
let shakeDuration = 0;

const keys = { a: false, d: false, space: false };
const mouse = { x: 0, y: 0, isDown: false };

const player = {
    x: 50, y: 400, vx: 0, vy: 0, width: 45, height: 25,
    speed: 0.6, maxSpeed: 7, friction: 0.85, gravity: 0.45, jumpForce: 12,
    grounded: false, isGrappling: false, anchorX: 0, anchorY: 0, ropeLength: 0, swingAccel: 0.3
};

function triggerShake(magnitude, duration) {
    shakeMagnitude = magnitude;
    shakeDuration = duration;
}

skipBtn.addEventListener("click", () => {
    if (currentLevel >= levels.length - 1) {
        gameComplete = true;
    } else {
        loadLevel(currentLevel + 1);
    }
});

window.addEventListener("keydown", (e) => {
    if (e.key.toLowerCase() === "a") keys.a = true;
    if (e.key.toLowerCase() === "d") keys.d = true;
    if (e.key === " ") {
        keys.space = true;
        if (player.isGrappling) {
            player.isGrappling = false;
            player.vy -= player.jumpForce * 0.6;
            triggerShake(4, 5); 
            spawnParticles(player.x + player.width/2, player.y + player.height/2, "#00e5ff", 8); 
        }
    }
});

window.addEventListener("keyup", (e) => {
    if (e.key.toLowerCase() === "a") keys.a = false;
    if (e.key.toLowerCase() === "d") keys.d = false;
    if (e.key === " ") keys.space = false;
});

canvas.addEventListener("mousemove", (e) => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
});

canvas.addEventListener("mousedown", (e) => {
    e.preventDefault(); 
    if (gameComplete) {
        gameComplete = false;
        loadLevel(0);
        return;
    }
    if (e.button === 0) {
        mouse.isDown = true;
        attemptGrapple();
    }
});

window.addEventListener("mouseup", (e) => {
    e.preventDefault();
    if (e.button === 0) {
        mouse.isDown = false;
        player.isGrappling = false;
    }
});

function spawnParticles(x, y, color, count) {
    for(let i=0; i<count; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 6,
            vy: (Math.random() - 0.5) * 6,
            alpha: 1,
            color: color
        });
    }
}

function attemptGrapple() {
    if (levels.length === 0 || gameComplete) return;
    const activeLevel = levels[currentLevel];
    let activePlatforms = [...activeLevel.platforms];
    if (activeLevel.movingPlatforms) {
        activePlatforms = activePlatforms.concat(activeLevel.movingPlatforms);
    }
    
    for (let plat of activePlatforms) {
        if (mouse.x >= plat.x && mouse.x <= plat.x + plat.width &&
            mouse.y >= plat.y && mouse.y <= plat.y + plat.height) {
            
            player.isGrappling = true;
            player.anchorX = mouse.x;
            player.anchorY = mouse.y;
            
            let dx = (player.x + player.width/2) - player.anchorX;
            let dy = (player.y + player.height/2) - player.anchorY;
            player.ropeLength = Math.sqrt(dx * dx + dy * dy);
            
            triggerShake(2, 3);
            spawnParticles(mouse.x, mouse.y, "#00e5ff", 10);
            return;
        }
    }
}

function loadLevel(index) {
    if (index >= levels.length) {
        gameComplete = true;
        return;
    }
    currentLevel = index;
    const levelData = levels[currentLevel];
    player.x = levelData.spawn.x;
    player.y = levelData.spawn.y;
    player.vx = 0;
    player.vy = 0;
    player.isGrappling = false;
    particles = [];
    startTime = Date.now();
    levelElement.innerText = currentLevel + 1;
    
    let bt = bestTimes[`level${currentLevel}`];
    bestTimeElement.innerText = bt ? bt : "--";
}

function checkCollision(p, plat) {
    return p.x < plat.x + plat.width && p.x + p.width > plat.x &&
           p.y < plat.y + plat.height && p.y + p.height > plat.y;
}

async function initGame() {
    try {
        const response = await fetch('levels.json?v=' + Date.now());
        levels = await response.json();
        loadLevel(0);
        update();
    } catch (error) {}
}

function update() {
    if (levels.length === 0) {
        requestAnimationFrame(update);
        return;
    }

    if (gameComplete) {
        ctx.fillStyle = "#000000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "#00e5ff";
        ctx.font = "bold 48px Consolas";
        ctx.textAlign = "center";
        ctx.fillText("SYSTEM OVERRIDDEN", canvas.width / 2, canvas.height / 2 - 20);
        
        ctx.fillStyle = "#ff5500";
        ctx.font = "24px Consolas";
        ctx.fillText("ESCAPE SUCCESSFUL", canvas.width / 2, canvas.height / 2 + 25);
        
        ctx.fillStyle = "#ffffff";
        ctx.font = "16px Consolas";
        ctx.fillText("Click anywhere to restart", canvas.width / 2, canvas.height / 2 + 80);
        
        requestAnimationFrame(update);
        return;
    }

    ctx.save(); 
    if (shakeDuration > 0) {
        ctx.translate((Math.random() - 0.5) * shakeMagnitude, (Math.random() - 0.5) * shakeMagnitude);
        shakeDuration--;
    }
    
    const elapsed = ((Date.now() - startTime) / 1000).toFixed(2);
    timerElement.innerText = elapsed;
    const activeLevel = levels[currentLevel];

    let activePlatforms = [...activeLevel.platforms];
    
    if (activeLevel.movingPlatforms) {
        for (let mPlat of activeLevel.movingPlatforms) {
            if (mPlat.baseX === undefined) {
                mPlat.baseX = mPlat.x;
                mPlat.baseY = mPlat.y;
            }

            let time = Date.now() * mPlat.speed;
            mPlat.currentX = mPlat.baseX + Math.sin(time) * mPlat.rangeX;
            mPlat.currentY = mPlat.baseY + Math.cos(time) * mPlat.rangeY;

            mPlat.vx = mPlat.currentX - (mPlat.prevX || mPlat.baseX);
            mPlat.vy = mPlat.currentY - (mPlat.prevY || mPlat.baseY);

            mPlat.prevX = mPlat.currentX;
            mPlat.prevY = mPlat.currentY;

            mPlat.x = mPlat.currentX;
            mPlat.y = mPlat.currentY;
            
            activePlatforms.push(mPlat);
        }
    }

    if (!player.isGrappling) {
        player.vy += player.gravity;
        if (keys.a) player.vx -= player.speed;
        if (keys.d) player.vx += player.speed;
        player.vx *= player.friction;
    } else {
        player.vy += player.gravity; 
        if (keys.a) player.vx -= player.swingAccel;
        if (keys.d) player.vx += player.swingAccel;
        
        let nextX = player.x + player.vx;
        let nextY = player.y + player.vy;
        let dx = (nextX + player.width/2) - player.anchorX;
        let dy = (nextY + player.height/2) - player.anchorY;
        let currentDist = Math.sqrt(dx * dx + dy * dy);
        
        if (currentDist > player.ropeLength) {
            let unitX = dx / currentDist;
            let unitY = dy / currentDist;
            player.x = player.anchorX + (unitX * player.ropeLength) - player.width/2;
            player.y = player.anchorY + (unitY * player.ropeLength) - player.height/2;
            
            let velAlongNormal = player.vx * unitX + player.vy * unitY;
            if (velAlongNormal > 0) {
                player.vx -= velAlongNormal * unitX;
                player.vy -= velAlongNormal * unitY;
            }
        }
    }

    player.vx = Math.max(-player.maxSpeed, Math.min(player.maxSpeed, player.vx));
    player.vy = Math.max(-player.maxSpeed * 1.5, Math.min(player.maxSpeed * 1.5, player.vy));

    player.x += player.vx;
    for (let plat of activePlatforms) {
        if (checkCollision(player, plat)) {
            if (player.vx > 0) player.x = plat.x - player.width;
            if (player.vx < 0) player.x = plat.x + plat.width;
            player.vx = 0;
        }
    }

    let previouslyGrounded = player.grounded;
    player.y += player.vy;
    player.grounded = false;
    
    for (let plat of activePlatforms) {
        if (checkCollision(player, plat)) {
            if (player.vy > 0) {
                player.y = plat.y - player.height;
                player.grounded = true;
                
                if (!previouslyGrounded && player.vy > 5) {
                    triggerShake(4, 5); 
                    spawnParticles(player.x + player.width/2, player.y + player.height, "#ff5500", 8);
                }
                
                player.vy = 0;
                if (plat.vx) player.x += plat.vx;
                if (plat.vy) player.y += plat.vy;
                
            } else if (player.vy < 0) {
                player.y = plat.y + plat.height;
                player.vy = 0;
            }
        }
    }

    if (keys.space && player.grounded && !player.isGrappling) {
        player.vy = -player.jumpForce;
        player.grounded = false;
        spawnParticles(player.x + player.width/2, player.y + player.height, "#ff5500", 5);
    }

    if (player.y > canvas.height + 200) {
        triggerShake(10, 10); 
        loadLevel(currentLevel); 
    }
    
    if (checkCollision(player, activeLevel.goal)) {
        let currentBest = bestTimes[`level${currentLevel}`];
        if (!currentBest || parseFloat(elapsed) < parseFloat(currentBest)) {
            bestTimes[`level${currentLevel}`] = elapsed;
            localStorage.setItem('neonTetherBestTimes', JSON.stringify(bestTimes));
        }
        loadLevel(currentLevel + 1);
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = "rgba(0, 229, 255, 0.05)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    for(let i=0; i<canvas.width; i+=40) { ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); }
    for(let i=0; i<canvas.height; i+=40) { ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); }
    ctx.stroke();

    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.alpha -= 0.03;
        if (p.alpha <= 0) {
            particles.splice(i, 1);
            continue;
        }
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = p.color;
        ctx.fillRect(p.x, p.y, 4, 4);
        ctx.shadowBlur = 0;
    }
    ctx.globalAlpha = 1.0;

    for (let plat of activePlatforms) {
        ctx.fillStyle = "#000000";
        ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
        
        ctx.strokeStyle = "#00e5ff";
        ctx.lineWidth = 2;
        ctx.shadowBlur = 10;
        ctx.shadowColor = "#00e5ff";
        ctx.strokeRect(plat.x, plat.y, plat.width, plat.height);
        ctx.shadowBlur = 0;
    }

    ctx.fillStyle = "#ff5500";
    ctx.shadowBlur = 20;
    ctx.shadowColor = "#ff5500";
    ctx.fillRect(activeLevel.goal.x, activeLevel.goal.y, activeLevel.goal.width, activeLevel.goal.height);
    ctx.shadowBlur = 0;

    if (player.isGrappling) {
        ctx.strokeStyle = "#00e5ff";
        ctx.lineWidth = 3;
        ctx.shadowBlur = 10;
        ctx.shadowColor = "#00e5ff";
        ctx.beginPath();
        ctx.moveTo(player.x + player.width/2, player.y + player.height/2);
        ctx.lineTo(player.anchorX, player.anchorY);
        ctx.stroke();
        ctx.shadowBlur = 0;

        ctx.fillStyle = "#ff5500";
        ctx.shadowBlur = 15;
        ctx.shadowColor = "#ff5500";
        ctx.beginPath();
        ctx.arc(player.anchorX, player.anchorY, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }

    if (bikeImg.complete && bikeImg.naturalHeight !== 0) {
        ctx.save();
        if (player.vx < -0.1 || (keys.a && !keys.d)) {
            ctx.translate(player.x + player.width, player.y);
            ctx.scale(-1, 1);
            ctx.drawImage(bikeImg, 0, 0, player.width, player.height);
        } else {
            ctx.drawImage(bikeImg, player.x, player.y, player.width, player.height);
        }
        ctx.restore();
    } else {
        ctx.fillStyle = player.isGrappling ? "#00e5ff" : "#ffffff";
        ctx.shadowBlur = 15;
        ctx.shadowColor = ctx.fillStyle;
        ctx.fillRect(player.x, player.y, player.width, player.height);
        ctx.shadowBlur = 0;
    }

    ctx.restore(); 
    requestAnimationFrame(update);
}

initGame();
</script>
</body>
</html>
